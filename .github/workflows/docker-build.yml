name: Docker build

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - docker-compose.yml
      - .dockerignore
      - docker/**
      - packages/**
      - crates/**
      - scripts/**
      - package.json
      - package-lock.json
      - turbo.json
      - lerna.json
      - .github/workflows/docker-build.yml
  pull_request:
    paths:
      - Dockerfile
      - docker-compose.yml
      - .dockerignore
      - docker/**
      - packages/**
      - crates/**
      - scripts/**
      - package.json
      - package-lock.json
      - turbo.json
      - lerna.json
      - .github/workflows/docker-build.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: opendaw-selfhosted:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
